<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" role="img" aria-label="Modernism: fractured rhythm and color">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" seed="19"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.055"/></feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#34281e" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="warmPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf2df"/>
      <stop offset="0.55" stop-color="#efe1c8"/>
      <stop offset="1" stop-color="#dcc8a9"/>
    </linearGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6e2f2d"/>
      <stop offset="0.5" stop-color="#b86947"/>
      <stop offset="1" stop-color="#2f4053"/>
    </linearGradient>
    <pattern id="staff" width="160" height="72" patternUnits="userSpaceOnUse">
      <path d="M0 8H160 M0 20H160 M0 32H160 M0 44H160 M0 56H160" stroke="#6f655a" stroke-opacity=".25" stroke-width="2"/>
    </pattern>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#6f655a" stroke-opacity=".13" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1440" height="600" fill="#ecebf4"/>
  <rect width="1440" height="600" filter="url(#grain)"/>
  <g opacity=".92" filter="url(#softShadow)">
    <polygon points="90,126 370,70 320,264 138,300" fill="#cf6d50"/>
    <polygon points="342,118 610,82 666,236 410,288" fill="#d7b150"/>
    <polygon points="682,76 930,146 842,320 606,240" fill="#4b79a1"/>
    <polygon points="928,130 1250,92 1334,286 1034,326" fill="#6f6fa8"/>
  </g>
  <g fill="none" stroke="#25211d" stroke-width="7" stroke-linecap="round" opacity=".65">
    <path d="M122 416l80-66 32 72 76-88 58 100 92-132 42 118 112-96 62 100 86-80 52 70 92-128 66 134 104-90 80 78 92-114"/>
    <path d="M135 475H1260" stroke-width="3" stroke-dasharray="18 16" opacity=".42"/>
  </g>
  <g transform="translate(1045 350) rotate(-12)" fill="none" stroke="#fbf6eb" stroke-width="8" opacity=".78">
    <path d="M0 0c38-86 132-110 188-44 42 50 12 124-58 112-68-12-76-92-14-132"/>
  </g>
  <text x="98" y="84" font-family="Georgia, serif" font-size="36" fill="#302a25">color breaks the old grammar</text>
  <text x="98" y="536" font-family="Georgia, serif" font-size="24" fill="#57483a" letter-spacing="2">timbre · rhythm · dissonance · collage</text>
</svg>
